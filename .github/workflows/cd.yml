            [ "${HTTP_CODE}" != "200" ] && { echo "❌ API HTTP ${HTTP_CODE}"; cat /tmp/artifacts.json; exit 1; }
            DOWNLOAD_URL=$(jq -r '.artifacts[] | select(.name == "deployment-metadata") | .archive_download_url' /tmp/artifacts.json)
            [ -z "${DOWNLOAD_URL}" ] || [ "${DOWNLOAD_URL}" = "null" ] && { echo "❌ deployment-metadata no encontrado"; exit 1; }
            HTTP_CODE=$(curl -sL -o /tmp/metadata.zip -w "%{http_code}" --max-time 60 \
              -H "Authorization: Bearer ${GH_TOKEN}" "${DOWNLOAD_URL}")
            [ "${HTTP_CODE}" != "200" ] && { echo "❌ Descarga fallida HTTP ${HTTP_CODE}"; exit 1; }
            mkdir -p /tmp/ci-metadata
            unzip -o /tmp/metadata.zip -d /tmp/ci-metadata/ > /dev/null
            rm -f /tmp/metadata.zip
            ARTIFACT_NAME=$(jq -r '.artifact' /tmp/ci-metadata/deployment-metadata.json | xargs)
            [ -z "${ARTIFACT_NAME}" ] || [ "${ARTIFACT_NAME}" = "null" ] && { echo "❌ No se pudo extraer artifact name"; exit 1; }
