            echo "ARTIFACT_NAME=${MANUAL_ARTIFACT}" >> $GITHUB_OUTPUT
          else
            echo "🔍 Obteniendo artifact del CI run ${CI_RUN_ID}..."
            HTTP_CODE=$(curl -s -o /tmp/artifacts.json -w "%{http_code}" --max-time 30 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
