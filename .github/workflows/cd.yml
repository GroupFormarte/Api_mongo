        run: |
          STATUS="${{ job.status }}"
          echo "## 🚀 Deploy DEV — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Proyecto** | \`${{ env.PROJECT_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
