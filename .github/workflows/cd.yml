          echo "Artifact: ${ARTIFACT_NAME}"
          echo "Branch:   ${{ github.event.workflow_run.head_branch || github.ref_name }}"
          echo "Actor:    ${{ github.event.workflow_run.triggering_actor.login || github.actor }}"
          echo "========================================================"
          sudo /opt/deploy/deploy-generic.sh "${{ env.PROJECT_NAME }}" "${ARTIFACT_NAME}"

      - name: Verify deployment
        run: |
          echo "✅ Verificando servicios en ${{ env.DEPLOYMENT_ROOT }}..."
          cd ${{ env.DEPLOYMENT_ROOT }}
