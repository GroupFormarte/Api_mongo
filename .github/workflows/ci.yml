name: Continuous Integration — Build & Publish

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

permissions:
  actions: read
  contents: read

jobs:
  # ========== JOB 1: Tests ==========
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint || echo "⚠️ No lint configured"

      - name: Run tests
        run: npm test || echo "⚠️ No tests configured"

  # ========== JOB 2: Build PROD (master → app.formarte.co) ==========
  build-prod:
    name: Build PROD Docker Image (app.formarte.co)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref_name == 'master'

    env:
      PROJECT_NAME: app.formarte.co
      DOCKER_IMAGE_NAME: app-formarte-co

    outputs:
      artifact-name: ${{ steps.vars.outputs.ARTIFACT_NAME }}
      git-sha: ${{ steps.vars.outputs.GIT_SHA_SHORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate build variables
        id: vars
        run: |
          GIT_SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_CLEAN=$(echo ${{ github.ref_name }} | tr '/' '-')
          ARTIFACT_NAME="${{ env.DOCKER_IMAGE_NAME }}-${BRANCH_CLEAN}-sha-${GIT_SHA_SHORT}-${TIMESTAMP}"
          echo "GIT_SHA_SHORT=${GIT_SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "📦 Artifact: ${ARTIFACT_NAME}.tar.gz"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.vars.outputs.GIT_SHA_SHORT }} \
            --tag ${{ env.DOCKER_IMAGE_NAME }}:latest \
            --label "git.commit=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.timestamp=${{ steps.vars.outputs.TIMESTAMP }}" \
            --label "build.actor=${{ github.actor }}" \
            .

      - name: Save & compress Docker image
        run: |
          docker save ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.vars.outputs.GIT_SHA_SHORT }} \
            -o ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar
          echo "📊 Raw size: $(du -sh ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar | cut -f1)"
          gzip -9 ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar
          echo "📊 Compressed: $(du -sh ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar.gz | cut -f1)"

      - name: Install Python dependencies
        run: pip install requests PyJWT cryptography

      - name: Upload artifact to SharePoint
        env:
          ARTIFACT_FILE: ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar.gz
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CERT_THUMBPRINT: ${{ secrets.AZURE_CERT_THUMBPRINT }}
          AZURE_PRIVATE_KEY: ${{ secrets.AZURE_PRIVATE_KEY }}
          SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
          SHAREPOINT_FOLDER: ${{ secrets.SHAREPOINT_FOLDER }}
        run: |
          echo "📤 Uploading to SharePoint: ${{ secrets.SHAREPOINT_FOLDER }}/${{ env.PROJECT_NAME }}"
          cat > /tmp/upload_sp.py << 'EOFPY'
          import os, sys, time, uuid, hashlib, requests, jwt, base64, binascii
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.backends import default_backend

          TENANT_ID       = os.environ['AZURE_TENANT_ID']
          CLIENT_ID       = os.environ['AZURE_CLIENT_ID']
          THUMBPRINT      = os.environ['AZURE_CERT_THUMBPRINT']
          PRIVATE_KEY_PEM = os.environ['AZURE_PRIVATE_KEY']
          SITE_URL        = os.environ['SHAREPOINT_SITE_URL'].rstrip('/')
          FOLDER_SUFFIX   = f"{os.environ['SHAREPOINT_FOLDER']}/{os.environ.get('PROJECT_NAME', '')}"
          ARTIFACT_FILE   = os.environ['ARTIFACT_FILE']

          SITE_HOST   = SITE_URL.split('/')[2]
          SITE_PATH   = '/' + '/'.join(SITE_URL.split('/')[3:])
          DOC_LIBRARY = 'Documentos compartidos'
          CHUNK_SIZE  = 10 * 1024 * 1024
          MAX_RETRIES = 5
          RETRY_DELAY = 2

          def normalize_pem(pem_str):
              lines = pem_str.strip().splitlines()
              return chr(10).join(l.strip() for l in lines)

          def retry_request(func, *args, **kwargs):
              for attempt in range(MAX_RETRIES):
                  try:
                      resp = func(*args, **kwargs)
                      if resp.status_code in [200, 201, 202]:
                          return resp
                      if resp.status_code in [429, 503, 504] and attempt < MAX_RETRIES - 1:
                          delay = RETRY_DELAY * (2 ** attempt)
                          print(f"⚠️ Error {resp.status_code}, retry {attempt+1}/{MAX_RETRIES} in {delay}s")
                          time.sleep(delay)
                          continue
                      return resp
                  except (requests.exceptions.Timeout, requests.exceptions.ConnectionError) as e:
                      if attempt < MAX_RETRIES - 1:
                          delay = RETRY_DELAY * (2 ** attempt)
                          print(f"⚠️ Network error, retry {attempt+1}/{MAX_RETRIES} in {delay}s")
                          time.sleep(delay)
                          continue
                      raise
              return resp

          def get_access_token():
              now = int(time.time())
              payload = {
                  'aud': f'https://login.microsoftonline.com/{TENANT_ID}/oauth2/v2.0/token',
                  'exp': now + 600, 'iss': CLIENT_ID,
                  'jti': hashlib.sha256(os.urandom(32)).hexdigest(),
                  'nbf': now, 'sub': CLIENT_ID
              }
              tb = binascii.unhexlify(THUMBPRINT.replace(':', '').replace(' ', ''))
              x5t = base64.urlsafe_b64encode(tb).rstrip(b'=').decode('ascii')
              pem = normalize_pem(PRIVATE_KEY_PEM)
              pk  = serialization.load_pem_private_key(pem.encode(), password=None, backend=default_backend())
              ca  = jwt.encode(payload, pk, algorithm='RS256', headers={'x5t': x5t})
              resp = requests.post(
                  f'https://login.microsoftonline.com/{TENANT_ID}/oauth2/v2.0/token',
                  data={'client_id': CLIENT_ID,
                        'client_assertion_type': 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer',
                        'client_assertion': ca,
                        'scope': f'https://{SITE_HOST}/.default',
                        'grant_type': 'client_credentials'}, timeout=30)
              if resp.status_code != 200:
                  print(f"❌ Token failed [{resp.status_code}]: {resp.text[:500]}")
                  sys.exit(1)
              return resp.json()['access_token']

          def ensure_project_folder_exists(token):
              from urllib.parse import quote
              api_base = f"https://{SITE_HOST}{SITE_PATH}/_api/web"
              headers = {'Authorization': f'Bearer {token}', 'Accept': 'application/json;odata=nometadata'}
              sp_folder = os.environ['SHAREPOINT_FOLDER']
              project_name = os.environ.get('PROJECT_NAME', '')
              parent_rel = f"{SITE_PATH}/{DOC_LIBRARY}/{sp_folder}"
              target_rel = f"{parent_rel}/{project_name}"
              check_url = f"{api_base}/GetFolderByServerRelativeUrl('{target_rel}')"
              if requests.get(check_url, headers=headers, timeout=30).status_code == 200:
                  print(f"✅ Folder exists: {project_name}")
                  return True
              encoded = quote(project_name, safe='')
              create_url = f"{api_base}/GetFolderByServerRelativeUrl('{parent_rel}')/folders/add(url='{encoded}')"
              resp = requests.post(create_url, headers=headers, timeout=30)
              if resp.status_code in [200, 201]:
                  print(f"✅ Created folder: {project_name}")
                  return True
              print(f"❌ Could not create folder: {resp.text[:200]}")
              return False

          def upload_file(token, file_path):
              file_size = os.path.getsize(file_path)
              file_name = os.path.basename(file_path)
              print(f"📊 File: {file_name}, Size: {file_size / (1024*1024):.2f} MB")
              h_base = {'Authorization': f'Bearer {token}', 'Accept': 'application/json;odata=nometadata'}
              folder_rel = f"{SITE_PATH}/{DOC_LIBRARY}/{FOLDER_SUFFIX}"
              api_base = f"https://{SITE_HOST}{SITE_PATH}/_api/web"
              folder_url = f"{api_base}/GetFolderByServerRelativeUrl('{folder_rel}')"

              if file_size <= 250 * 1024 * 1024:
                  upload_url = f"{folder_url}/Files/add(url='{file_name}',overwrite=true)"
                  with open(file_path, 'rb') as f:
                      file_data = f.read()
                  print("📤 Uploading file in single request...")
                  resp = retry_request(
                      requests.post, upload_url,
                      headers={**h_base, 'Content-Type': 'application/octet-stream'},
                      data=file_data, timeout=600
                  )
                  if resp.status_code not in [200, 201]:
                      print(f"❌ Upload failed [{resp.status_code}]: {resp.text[:400]}")
                      sys.exit(1)
              else:
                  # Workaround: SharePoint requires file to exist before StartUpload
                  # Create a 1-byte placeholder file first, then chunk-upload over it
                  print("📤 Creating placeholder file for chunked upload...")
                  create_url = f"{folder_url}/Files/add(url='{file_name}',overwrite=true)"
                  resp = retry_request(
                      requests.post, create_url,
                      headers={**h_base, 'Content-Type': 'application/octet-stream'},
                      data=b'\x00', timeout=60
                  )
                  if resp.status_code not in [200, 201]:
                      print(f"❌ Placeholder creation failed [{resp.status_code}]: {resp.text[:400]}")
                      sys.exit(1)
                  print("✅ Placeholder created, starting chunked upload...")

                  upload_id = str(uuid.uuid4())
                  total_chunks = (file_size + CHUNK_SIZE - 1) // CHUNK_SIZE
                  file_server_rel = f"{folder_rel}/{file_name}"
                  file_url = f"{api_base}/GetFileByServerRelativeUrl('{file_server_rel}')"

                  with open(file_path, 'rb') as f:
                      offset = 0
                      chunk_num = 0
                      while True:
                          chunk = f.read(CHUNK_SIZE)
                          if not chunk:
                              break
                          chunk_num += 1
                          is_first = (offset == 0)
                          is_last = (offset + len(chunk) >= file_size)
                          if is_first:
                              url = f"{file_url}/StartUpload(uploadId=guid'{upload_id}')"
                          elif is_last:
                              url = f"{file_url}/FinishUpload(uploadId=guid'{upload_id}',fileOffset={offset})"
                          else:
                              url = f"{file_url}/ContinueUpload(uploadId=guid'{upload_id}',fileOffset={offset})"

                          pct = (offset / file_size) * 100
                          print(f"📤 Chunk {chunk_num}/{total_chunks} ({pct:.1f}%) - {offset / (1024*1024):.1f} / {file_size / (1024*1024):.1f} MB")

                          resp = retry_request(
                              requests.post, url,
                              headers={**h_base, 'Content-Type': 'application/octet-stream'},
                              data=chunk, timeout=300
                          )
                          ok_codes = [200, 201] if is_last else [200, 201, 202]
                          if resp.status_code not in ok_codes:
                              print(f"❌ Chunk {chunk_num} failed [{resp.status_code}]: {resp.text[:300]}")
                              sys.exit(1)
                          offset += len(chunk)
              print(f"✅ Uploaded: {file_name}")

          token = get_access_token()
          ensure_project_folder_exists(token)
          upload_file(token, ARTIFACT_FILE)
          print("✅ Artifact uploaded successfully!")
          EOFPY
          python3 /tmp/upload_sp.py

      - name: Create deployment metadata
        run: |
          cat > deployment-metadata.json << EOF
          {
            "artifact": "${{ steps.vars.outputs.ARTIFACT_NAME }}.tar.gz",
            "git_commit": "${{ github.sha }}",
            "git_commit_short": "${{ steps.vars.outputs.GIT_SHA_SHORT }}",
            "git_branch": "${{ github.ref_name }}",
            "git_author": "${{ github.actor }}",
            "build_timestamp": "${{ steps.vars.outputs.TIMESTAMP }}",
            "github_run_id": "${{ github.run_id }}",
            "github_run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metadata
          path: deployment-metadata.json
          retention-days: 7

      - name: Summary
        run: |
          echo "## 📦 Build PROD — app.formarte.co" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact** | \`${{ steps.vars.outputs.ARTIFACT_NAME }}.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`master\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | app.formarte.co |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ steps.vars.outputs.GIT_SHA_SHORT }}\` |" >> $GITHUB_STEP_SUMMARY

