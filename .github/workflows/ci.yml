name: Continuous Integration — Build & Publish

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

permissions:
  actions: read
  contents: read

jobs:
  # ========== JOB 1: Tests ==========
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint || echo "⚠️ No lint configured"

      - name: Run tests
        run: npm test || echo "⚠️ No tests configured"

  # ========== JOB 2: Build PROD (master → app.formarte.co) ==========
  build-prod:
    name: Build PROD Docker Image (app.formarte.co)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref_name == 'master'

    env:
      PROJECT_NAME: app.formarte.co
      DOCKER_IMAGE_NAME: app-formarte-co

    outputs:
      artifact-name: ${{ steps.vars.outputs.ARTIFACT_NAME }}
      git-sha: ${{ steps.vars.outputs.GIT_SHA_SHORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate build variables
        id: vars
        run: |
          GIT_SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_CLEAN=$(echo ${{ github.ref_name }} | tr '/' '-')
          ARTIFACT_NAME="${{ env.DOCKER_IMAGE_NAME }}-${BRANCH_CLEAN}-sha-${GIT_SHA_SHORT}-${TIMESTAMP}"
          echo "GIT_SHA_SHORT=${GIT_SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "📦 Artifact: ${ARTIFACT_NAME}.tar.gz"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.vars.outputs.GIT_SHA_SHORT }} \
            --tag ${{ env.DOCKER_IMAGE_NAME }}:latest \
            --label "git.commit=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.timestamp=${{ steps.vars.outputs.TIMESTAMP }}" \
            --label "build.actor=${{ github.actor }}" \
            .

      - name: Save & compress Docker image
        run: |
          docker save ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.vars.outputs.GIT_SHA_SHORT }} \
            -o ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar
          echo "📊 Raw size: $(du -sh ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar | cut -f1)"
          gzip -9 ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar
          echo "📊 Compressed: $(du -sh ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar.gz | cut -f1)"

      - name: Install Python dependencies
        run: pip install requests PyJWT cryptography

      - name: Upload artifact to SharePoint
        env:
          ARTIFACT_FILE: ${{ steps.vars.outputs.ARTIFACT_NAME }}.tar.gz
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CERT_THUMBPRINT: ${{ secrets.AZURE_CERT_THUMBPRINT }}
          AZURE_PRIVATE_KEY: ${{ secrets.AZURE_PRIVATE_KEY }}
          SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
          SHAREPOINT_FOLDER: ${{ secrets.SHAREPOINT_FOLDER }}
        run: |
          echo "📤 Uploading to SharePoint: ${{ secrets.SHAREPOINT_FOLDER }}/${{ env.PROJECT_NAME }}"
          cat > /tmp/upload_sp.py << 'EOFPY'
          import os,sys,time,uuid,hashlib,requests,jwt,base64,binascii
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.backends import default_backend
          T=os.environ['AZURE_TENANT_ID'];C=os.environ['AZURE_CLIENT_ID'];TH=os.environ['AZURE_CERT_THUMBPRINT'];PK=os.environ['AZURE_PRIVATE_KEY'];SU=os.environ['SHAREPOINT_SITE_URL'].rstrip('/');FS=f"{os.environ['SHAREPOINT_FOLDER']}/{os.environ.get('PROJECT_NAME','')}";AF=os.environ['ARTIFACT_FILE'];SH=SU.split('/')[2];SP='/'+'/'.join(SU.split('/')[3:]);DL='Documentos compartidos';CS=10*1024*1024;MR=5;RD=2
          def norm_pem(s):return'
'.join(l.strip()for l in s.strip().splitlines())
          def retry(f,*a,**k):
           for i in range(MR):
            try:
             r=f(*a,**k)
             if r.status_code in[200,201,202]:return r
             if r.status_code in[429,503,504]and i<MR-1:d=RD*(2**i);print(f"⚠️ {r.status_code}, retry {i+1}/{MR} in {d}s");time.sleep(d);continue
             return r
            except Exception as e:
             if i<MR-1:d=RD*(2**i);print(f"⚠️ Error, retry {i+1}/{MR}");time.sleep(d);continue
             raise
           return r
          def token():n=int(time.time());p={'aud':f'https://login.microsoftonline.com/{T}/oauth2/v2.0/token','exp':n+600,'iss':C,'jti':hashlib.sha256(os.urandom(32)).hexdigest(),'nbf':n,'sub':C};tb=binascii.unhexlify(TH.replace(':','').replace(' ',''));x=base64.urlsafe_b64encode(tb).rstrip(b'=').decode('ascii');pm=norm_pem(PK);pk=serialization.load_pem_private_key(pm.encode(),password=None,backend=default_backend());ca=jwt.encode(p,pk,algorithm='RS256',headers={'x5t':x});r=requests.post(f'https://login.microsoftonline.com/{T}/oauth2/v2.0/token',data={'client_id':C,'client_assertion_type':'urn:ietf:params:oauth:client-assertion-type:jwt-bearer','client_assertion':ca,'scope':f'https://{SH}/.default','grant_type':'client_credentials'},timeout=30);return r.json()['access_token']if r.status_code==200 else sys.exit(1)
          def folder(t):from urllib.parse import quote;a=f"https://{SH}{SP}/_api/web";h={'Authorization':f'Bearer {t}','Accept':'application/json;odata=nometadata'};sf=os.environ['SHAREPOINT_FOLDER'];pn=os.environ.get('PROJECT_NAME','');pr=f"{SP}/{DL}/{sf}";tr=f"{pr}/{pn}";return True if requests.get(f"{a}/GetFolderByServerRelativeUrl('{tr}')",headers=h,timeout=30).status_code==200 else requests.post(f"{a}/GetFolderByServerRelativeUrl('{pr}')/folders/add(url='{quote(pn,safe='')}')",headers=h,timeout=30).status_code in[200,201]
          def upload(t,fp):fs=os.path.getsize(fp);fn=os.path.basename(fp);print(f"📊 {fn}: {fs/(1024*1024):.2f}MB");h={'Authorization':f'Bearer {t}','Accept':'application/json;odata=nometadata'};fr=f"{SP}/{DL}/{FS}";a=f"https://{SH}{SP}/_api/web";fu=f"{a}/GetFolderByServerRelativeUrl('{fr}')";uu=f"{fu}/Files/add(url='{fn}',overwrite=true)"
           if fs<=250*1024*1024:
            with open(fp,'rb')as f:fd=f.read()
            print("📤 Upload");r=retry(requests.post,uu,headers={**h,'Content-Type':'application/octet-stream'},data=fd,timeout=600);sys.exit(1)if r.status_code not in[200,201]else None
           else:
            u=str(uuid.uuid4())
            with open(fp,'rb')as f:o=0;cn=0;tc=(fs+CS-1)//CS
             while True:
              c=f.read(CS)
              if not c:break
              cn+=1;isf=(o==0);isl=(o+len(c)>=fs);url=f"{fu}/Files/add(url='{fn}',overwrite=true)/StartUpload(uploadId=guid'{u}')"if isf else(f"{fu}/GetFileByUrl('{fn}')/FinishUpload(uploadId=guid'{u}',fileOffset={o})"if isl else f"{fu}/GetFileByUrl('{fn}')/ContinueUpload(uploadId=guid'{u}',fileOffset={o})");print(f"📤 {cn}/{tc} ({(o/fs)*100:.1f}%)");r=retry(requests.post,url,headers={**h,'Content-Type':'application/octet-stream'},data=c,timeout=300);ok=[200,201]if isl else[200,201,202];sys.exit(1)if r.status_code not in ok else None;o+=len(c)
           print(f"✅ {fn}")
          tk=token();folder(tk);upload(tk,AF);print("✅ Done!")
          EOFPY
          python3 /tmp/upload_sp.py

      - name: Create deployment metadata
        run: |
          cat > deployment-metadata.json << EOF
          {
            "artifact": "${{ steps.vars.outputs.ARTIFACT_NAME }}.tar.gz",
            "git_commit": "${{ github.sha }}",
            "git_commit_short": "${{ steps.vars.outputs.GIT_SHA_SHORT }}",
            "git_branch": "${{ github.ref_name }}",
            "git_author": "${{ github.actor }}",
            "build_timestamp": "${{ steps.vars.outputs.TIMESTAMP }}",
            "github_run_id": "${{ github.run_id }}",
            "github_run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metadata
          path: deployment-metadata.json
          retention-days: 7

      - name: Summary
        run: |
          echo "## 📦 Build PROD — app.formarte.co" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact** | \`${{ steps.vars.outputs.ARTIFACT_NAME }}.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`master\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | app.formarte.co |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ steps.vars.outputs.GIT_SHA_SHORT }}\` |" >> $GITHUB_STEP_SUMMARY

